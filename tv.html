<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stream Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<style>
  :root {
    --bg: #fafcfa;
    --panel: #ffffff;
    --panel-hover: #eef7ef;
    --border: #dfe8e0;
    --text: #1f2b22;
    --text-dim: #7c8c7e;
    --green: #2f9e52;
    --green-soft: #e3f5e7;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); margin: 0; height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--panel);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    transition: transform .2s ease;
  }
  #sidebar-header {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600;
    letter-spacing: .03em; color: var(--green);
  }
  #sidebar-header i { font-size: 13px; }
  #close-sidebar { margin-left: auto; display: none; background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; }

  #search-wrap { position: relative; padding: 8px; border-bottom: 1px solid var(--border); }
  #search-wrap i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 12px; }
  #search {
    width: 100%; padding: 6px 10px 6px 28px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none;
  }
  #search:focus { border-color: var(--green); }

  #channels { list-style: none; margin: 0; padding: 4px; overflow-y: auto; flex: 1; }
  #channels li {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer;
    border-radius: 6px; font-size: 13px; color: var(--text); line-height: 1.2;
  }
  #channels li i.fa-play { font-size: 9px; color: var(--text-dim); width: 10px; text-align: center; }
  #channels li i.fa-lock { font-size: 10px; color: var(--text-dim); margin-left: auto; }
  #channels li:hover { background: var(--panel-hover); }
  #channels li.active { background: var(--green-soft); color: var(--green); font-weight: 600; }
  #channels li.active i.fa-play { color: var(--green); }
  #channels li.hidden { display: none; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar {
    display: none; align-items: center; gap: 10px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); background: var(--panel);
  }
  #menu-btn { background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; }
  #topbar span { font-size: 13px; font-weight: 600; color: var(--green); }

  #video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; min-height: 0; }
  video { width: 100%; height: 100%; max-height: 100%; object-fit: contain; background: #000; }

  #status {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 12px;
    color: var(--text-dim); background: var(--panel); border-top: 1px solid var(--border);
  }
  #status i { color: var(--green); }
  #status.error i { color: #c0392b; }
  #status.error { color: #c0392b; }
  #status i.fa-circle-notch { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.25); z-index: 5; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Mobile */
  @media (max-width: 720px) {
    #sidebar {
      position: fixed; z-index: 10; top: 0; bottom: 0; left: 0;
      transform: translateX(-100%); width: 78vw; max-width: 300px;
    }
    #sidebar.open { transform: translateX(0); }
    #close-sidebar { display: block; }
    #topbar { display: flex; }
    #overlay.show { display: block; }
  }
</style>
</head>
<body>

<div id="overlay"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <i class="fa-solid fa-satellite-dish"></i>
    <span>CHANNELS</span>
    <button id="close-sidebar" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div id="search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="search" type="text" placeholder="Search channels...">
  </div>
  <ul id="channels"></ul>
</div>

<div id="main">
  <div id="topbar">
    <button id="menu-btn" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
    <span id="current-name">Select a channel</span>
  </div>
  <div id="video-wrap">
    <video id="video" controls autoplay playsinline></video>
  </div>
  <div id="status"><i class="fa-solid fa-circle-info"></i><span>Select a channel to start</span></div>
</div>

<script>
let hls = null;
let dash = null;

const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');
const currentNameEl = document.getElementById('current-name');

function setStatus(icon, text, isError) {
  statusEl.classList.toggle('error', !!isError);
  statusEl.innerHTML = '<i class="fa-solid ' + icon + '"></i><span>' + text + '</span>';
}

function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
document.getElementById('menu-btn').onclick = openSidebar;
document.getElementById('close-sidebar').onclick = closeSidebar;
overlay.onclick = closeSidebar;

function playChannel(ch, li) {
  const url = ch.url;
  document.querySelectorAll('#channels li').forEach(el => el.classList.remove('active'));
  if (li) li.classList.add('active');
  currentNameEl.textContent = ch.name;
  closeSidebar();

  const video = document.getElementById('video');
  setStatus('fa-circle-notch', 'Loading ' + ch.name + ' ...');

  if (hls) { hls.destroy(); hls = null; }
  if (dash) { dash.destroy(); dash = null; }

  const isDash = url.toLowerCase().includes('.mpd');

  if (isDash) {
    dash = dashjs.MediaPlayer().create();
    dash.on(dashjs.MediaPlayer.events.ERROR, (e) => {
      setStatus('fa-triangle-exclamation', 'Error: ' + JSON.stringify(e.error), true);
    });

    if (ch.clearkey) {
      const [kid, key] = ch.clearkey.split(':');
      dash.setProtectionData({
        'org.w3.clearkey': { clearkeys: { [kid]: key } }
      });
    }

    dash.initialize(video, url, true);
  } else if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    hls.on(Hls.Events.ERROR, (event, data) => {
      setStatus('fa-triangle-exclamation', 'Error: ' + data.details, true);
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play();
  } else {
    setStatus('fa-triangle-exclamation', 'Neither HLS nor DASH supported in this browser', true);
    return;
  }
  setStatus('fa-circle-play', 'Playing: ' + ch.name);
}

fetch('xchannels.json')
  .then(r => r.json())
  .then(channels => {
    const list = document.getElementById('channels');
    channels.forEach((ch, i) => {
      const li = document.createElement('li');
      li.innerHTML = '<i class="fa-solid fa-play"></i><span>' + ch.name + '</span>' +
        (ch.clearkey ? '<i class="fa-solid fa-lock" title="Encrypted"></i>' : '');
      li.dataset.name = ch.name.toLowerCase();
      li.onclick = () => playChannel(ch, li);
      list.appendChild(li);
      if (i === 0) playChannel(ch, li);
    });

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      list.querySelectorAll('li').forEach(li => {
        li.classList.toggle('hidden', !li.dataset.name.includes(q));
      });
    });
  })
  .catch(err => {
    setStatus('fa-triangle-exclamation',
      'Failed to load channels.json (' + err + '). Run this page from a local server, not by double-clicking the file.', true);
  });
</script>

</body>
</html>
